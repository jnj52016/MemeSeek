    (() =&gt; {
      const root = document.getElementById(&#x27;memeseek-mvp&#x27;);
      const search = root.querySelector(&#x27;#meme-search&#x27;);
      const cards = [...root.querySelectorAll(&#x27;.meme-card&#x27;)];
      const count = root.querySelector(&#x27;#meme-count&#x27;);
      const modal = root.querySelector(&#x27;#meme-modal&#x27;);
      const modalTitle = root.querySelector(&#x27;#modal-title&#x27;);
      const close = root.querySelector(&#x27;#close-modal&#x27;);
      search.addEventListener(&#x27;input&#x27;, () =&gt; {
        const query = search.value.trim().toLowerCase();
        let visible = 0;
        cards.forEach((card) =&gt; {
          const matched = !query || card.textContent.toLowerCase().includes(query);
          card.hidden = !matched;
          if (matched) visible += 1;
        });
        count.textContent = String(visible);
      });
      cards.forEach((card) =&gt; card.addEventListener(&#x27;click&#x27;, () =&gt; {
        modalTitle.textContent = card.dataset.title;
        modal.classList.add(&#x27;open&#x27;);
      }));
      close.addEventListener(&#x27;click&#x27;, () =&gt; modal.classList.remove(&#x27;open&#x27;));
      modal.addEventListener(&#x27;click&#x27;, (event) =&gt; { if (event.target === modal) modal.classList.remove(&#x27;open&#x27;); });
      root.querySelector(&#x27;#save-settings&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { root.querySelector(&#x27;#save-status&#x27;).textContent = &#x27;已保存&#x27;; });
