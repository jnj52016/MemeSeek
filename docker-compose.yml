services:
  postgres:
    image: postgres:16-alpine
    container_name: memeseek-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-memeseek}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memeseek_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-memeseek}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-memeseek} -d ${POSTGRES_DB:-memeseek}']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
